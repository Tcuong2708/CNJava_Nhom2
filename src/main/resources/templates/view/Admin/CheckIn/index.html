<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Nghiệp vụ Nhận phòng (Check-in) - MAY HOTEL</title>
</head>
<body>

<th:block th:fragment="extra_css">
  <link rel="stylesheet" th:href="@{/css/Admin/Checkin/index.css}" />
</th:block>

<div th:fragment="body_content">
  <div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h3 class="fw-bold text-uppercase text-navy">
        <i class="bi bi-box-arrow-in-right me-2 text-gold"></i>Nghiệp vụ Nhận phòng (Check-in)
      </h3>
    </div>

    <div th:if="${success}" class="alert alert-success border-0 shadow-sm text-center mb-4" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger border-0 shadow-sm text-center mb-4" th:text="${error}"></div>

    <div class="card shadow-sm border-0 rounded-3 overflow-hidden">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="bg-navy text-white text-uppercase small">
            <tr>
              <th class="ps-4 py-3">Mã HD</th>
              <th>Khách hàng</th>
              <th>Số điện thoại</th>
              <th class="text-center">Số phòng phân bổ</th>
              <th>Thời gian dự kiến</th>
              <th class="text-end">Tổng tiền tạm tính</th>
              <th class="text-center" style="width: 180px;">Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${invoices == null or #lists.isEmpty(invoices)}">
              <td colspan="7" class="text-center py-5 text-muted">
                <i class="bi bi-inbox fs-2 d-block mb-2 opacity-50"></i>
                Hiện tại chưa có phiếu đặt phòng nào chờ làm thủ tục Check-in.
              </td>
            </tr>
            <tr th:unless="${invoices == null or #lists.isEmpty(invoices)}" th:each="item : ${invoices}">
              <td class="ps-4 fw-bold text-navy" th:text="'#' + ${item.id}">#1</td>
              <td class="fw-bold text-secondary" th:text="${item.hoTen}">Tên khách</td>
              <td th:text="${item.sdt}">SĐT</td>
              <td class="text-center">
                                    <span class="badge bg-primary px-3 py-2 rounded-pill fw-bold"
                                          th:text="'Phòng ' + ${item.maPhong}">Phòng 101</span>
              </td>
              <td>
                <small class="d-block text-muted">Nhận: <strong class="text-dark" th:text="${item.ngayCheckIn}">01/01</strong></small>
                <small class="d-block text-muted">Trả: <strong class="text-dark" th:text="${item.ngayCheckOut}">02/01</strong></small>
              </td>
              <td class="text-end fw-bold text-danger"
                  th:text="${#numbers.formatDecimal(item.totalPrice, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</td>
              <td class="text-center">
                <a th:href="@{/admin/checkin/execute/{id}(id=${item.id})}"
                   class="btn btn-gold btn-sm px-3 rounded-pill fw-bold"
                   onclick="return confirm('Xác nhận cho khách nhận phòng vật lý và bắt đầu tính giờ lưu trú?')">
                  <i class="bi bi-check2-circle me-1"></i> Nhận phòng
                </a>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<th:block th:fragment="extra_js">
</th:block>

</body>
</html>

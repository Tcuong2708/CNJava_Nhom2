<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:fragment="extra_css">
        <link rel="stylesheet" th:href="@{/css/Admin/Room/admin-room.css}">
    </th:block>
</head>
<body>
<div th:fragment="body_content">
    <div class="container py-5">
        <div class="admin-card" style="background: white; border-radius: 8px; box-shadow: 0 5px 20px rgba(15, 41, 66, 0.1); overflow: hidden;">
            <div class="admin-header d-flex justify-content-between align-items-center"
                 style="background-color: #0F2942; color: white; padding: 20px 25px; border-bottom: 3px solid #C5A017;">
                <h4 class="mb-0 fw-bold text-uppercase" style="letter-spacing: 1px;">
                    <i class="bi bi-ui-checks-grid me-2 text-warning"></i>Quản Lý Phòng
                </h4>
                <a th:href="@{/admin/rooms/create}" class="btn btn-light fw-bold shadow-sm" style="color: #0F2942;">
                    <i class="bi bi-plus-circle-fill me-1" style="color: #C5A017;"></i> Thêm Phòng Mới
                </a>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead style="background-color: #f8f9fa; border-bottom: 2px solid #e9ecef;">
                    <tr>
                        <th class="ps-4 text-secondary text-uppercase small fw-bold">Hình ảnh</th>
                        <th class="text-secondary text-uppercase small fw-bold">Tên phòng</th>
                        <th class="text-secondary text-uppercase small fw-bold">Giá phòng</th>
                        <th class="text-secondary text-uppercase small fw-bold">Loại phòng</th>
                        <th class="text-center text-secondary text-uppercase small fw-bold" style="width: 180px">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="p : ${rooms}">
                        <td class="ps-4">
                            <img th:src="${(p.imageUrl != null && p.imageUrl != '') ? '/images/' + p.imageUrl : '/images/no-image.png'}"
                                 class="shadow-sm img-thumb"
                                 style="width: 80px; height: 60px; object-fit: cover; border-radius: 4px; border: 1px solid #ddd;"
                                 alt="Room Image">
                        </td>
                        <td class="fw-bold" style="color: #0F2942;" th:text="${p.name}"></td>
                        <td style="color: #C5A017; font-weight: 700; font-size: 1.1rem;"
                            th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT') + ' đ'}"></td>
                        <td>
                                <span class="badge rounded-pill px-3 py-2"
                                      style="background-color: #e9ecef; color: #0F2942; font-weight: 600; border: 1px solid #0F2942;"
                                      th:text="${p.loaiPhong != null ? p.loaiPhong.name : 'Chưa phân loại'}"></span>
                        </td>
                        <td class="text-center">
                            <a th:href="@{/admin/rooms/details/{id}(id=${p.id})}" class="btn btn-dark rounded-circle p-0" style="width:35px; height:35px; line-height:35px;"><i class="bi bi-eye"></i></a>
                            <a th:href="@{/admin/rooms/edit/{id}(id=${p.id})}" class="btn btn-warning text-white rounded-circle p-0" style="width:35px; height:35px; line-height:35px; background-color: #C5A017; border:none;"><i class="bi bi-pencil-square"></i></a>
                            <a th:href="@{/admin/rooms/delete/{id}(id=${p.id})}" class="btn btn-danger rounded-circle p-0" style="width:35px; height:35px; line-height:35px;"><i class="bi bi-trash"></i></a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<th:block th:fragment="extra_css">
    <style>
        .table-hover tbody tr:hover { background-color: rgba(197, 160, 23, 0.05); transition: 0.3s; }
    </style>
</th:block>
<th:block th:fragment="extra_js"></th:block>
</body>
</html>

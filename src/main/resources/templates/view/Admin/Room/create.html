<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<body>

<div th:fragment="body_content">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="admin-form-card shadow-sm">
                    <div class="admin-header">
                        <h3 class="mb-0 fw-bold text-uppercase">
                            <i class="bi bi-door-open-fill me-2 text-warning"></i>Thêm Phòng Nghỉ Mới
                        </h3>
                    </div>

                    <div class="card-body p-4">
                        <form th:action="@{/admin/rooms/create}" th:object="${phong}" method="post" enctype="multipart/form-data">

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Tên Phòng <span class="text-danger">*</span></label>
                                    <input type="text" th:field="*{name}" class="form-control" placeholder="Ví dụ: P201 Deluxe" required />
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Giá (VNĐ/đêm) <span class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-currency-dollar"></i></span>
                                        <input type="number" th:field="*{price}" class="form-control" required />
                                    </div>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Loại phòng <span class="text-danger">*</span></label>
                                    <select th:field="*{maLoai}" class="form-select" required>
                                        <option value="">-- Chọn loại phòng --</option>
                                        <option th:each="l : ${listLoai}"
                                                th:value="${l.maLoai}"
                                                th:text="${l.name}"></option>
                                    </select>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Hình ảnh phòng</label>
                                    <input type="file" name="imageFile" class="form-control" accept="image/*" />
                                    <small class="text-muted fst-italic">Ảnh sẽ được lưu vào thư mục static/images</small>
                                </div>

                                <div class="col-md-12 mb-3">
                                    <label class="form-label">Mô tả chi tiết</label>
                                    <textarea th:field="*{detail}" class="form-control" rows="4"></textarea>
                                </div>
                            </div>

                            <div class="d-flex justify-content-between align-items-center mt-4 pt-3 border-top">
                                <a th:href="@{/admin/rooms}" class="btn btn-outline-secondary px-4">
                                    <i class="bi bi-arrow-left"></i> Quay lại
                                </a>

                                <button type="submit" class="btn btn-gold px-5 shadow-sm">
                                    <i class="bi bi-save me-2"></i> LƯU PHÒNG MỚI
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:fragment="body_content">
    <link rel="stylesheet" th:href="@{/css/Admin/Room/admin-room.css}">

    <div class="container py-5">
    </div>
</div>

<th:block th:fragment="extra_js">
    <script>
        console.log("Trang Create Room đã sẵn sàng!");
    </script>
</th:block>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div th:fragment="body_content">
    <link rel="stylesheet" th:href="@{/css/Admin/Room/admin-room.css}">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="delete-card shadow">
                    <div class="admin-header-navy p-3 text-center" style="background: #0F2942; color: white;">
                        <h4 class="mb-0 text-uppercase">Xác nhận xóa</h4>
                    </div>
                    <div class="card-body p-4 text-center">
                        <div class="warning-box mb-4">
                            <i class="bi bi-exclamation-triangle-fill fs-1"></i>
                            <h5 class="mt-2">Bạn có chắc chắn muốn xóa phòng này?</h5>
                            <p class="mb-0">Hành động này không thể hoàn tác!</p>
                        </div>

                        <h3 class="fw-bold text-navy" th:text="${phong.name}"></h3>
                        <p class="text-muted" th:text="${'Loại: ' + phong.loaiPhong.name}"></p>

                        <form th:action="@{/admin/rooms/delete}" method="post" class="mt-4">
                            <input type="hidden" name="id" th:value="${phong.id}" />
                            <div class="d-flex justify-content-center gap-3">
                                <a th:href="@{/admin/rooms}" class="btn btn-outline-secondary px-4">HỦY BỎ</a>
                                <button type="submit" class="btn btn-danger px-4 shadow-sm" style="background: #dc3545;">
                                    XÁC NHẬN XÓA
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>

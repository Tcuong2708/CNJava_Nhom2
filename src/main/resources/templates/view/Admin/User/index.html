<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý người dùng - May Hotel</title>
</head>
<body>

<th:block th:fragment="extra_css">
    <link rel="stylesheet" th:href="@{/css/Admin/User/index.css}">
</th:block>

<div th:fragment="body_content">
    <div class="container py-5">
        <!-- Tiêu đề và Nút thêm mới -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold text-uppercase" style="color: var(--navy-color);">
                <i class="bi bi-people-fill me-2 text-gold"></i>Quản Lý Người Dùng
            </h3>
            <!-- Chuyển từ @Url.Action sang th:href -->
            <a th:href="@{/admin/users/create}" class="btn btn-gold px-4 shadow-sm text-white">
                <i class="bi bi-person-plus-fill me-1"></i> Thêm Người Dùng
            </a>
        </div>

        <div class="card shadow-sm border-0 admin-card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-header-navy">
                        <tr>
                            <th class="ps-4 py-3 text-uppercase small">Tên đăng nhập</th>
                            <th class="text-uppercase small">Họ và Tên</th>
                            <th class="text-uppercase small">Quốc tịch</th>
                            <th class="text-center text-uppercase small">Vai trò</th>
                            <th class="text-center text-uppercase small" style="width: 180px;">Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${users == null or #lists.isEmpty(users)}">
                            <td colspan="5" class="text-center py-5 text-muted">
                                <i class="bi bi-inbox fs-1 d-block mb-2 opacity-25"></i>
                                Chưa có dữ liệu người dùng.
                            </td>
                        </tr>

                        <tr th:unless="${users == null or #lists.isEmpty(users)}" th:each="u : ${users}">
                            <td class="ps-4 fw-bold" style="color: var(--navy-color);">
                                <i class="bi bi-person-badge me-2 text-gold opacity-75"></i>
                                <span th:text="${u.tenDangNhap}">admin</span>
                            </td>

                            <td th:text="${u.hoTen}">Họ Tên</td>

                            <td>
                                <!-- Toán tử 3 ngôi xử lý Quốc tịch -->
                                <span th:text="${u.quocTich != null and !u.quocTich.isEmpty() ? u.quocTich : 'Việt Nam'}"></span>
                            </td>

                            <td class="text-center">
                                <!-- Hiển thị Badge vai trò -->
                                <th:block th:switch="${u.roleID}">
                                    <span th:case="1" class="badge rounded-pill badge-custom badge-role-admin">ADMIN</span>
                                    <span th:case="2" class="badge rounded-pill badge-custom badge-role-staff">Nhân viên</span>
                                    <span th:case="*" class="badge rounded-pill badge-custom badge-role-user">Khách hàng</span>
                                </th:block>
                            </td>

                            <td class="text-center">
                                <!-- Nút Xem chi tiết -->
                                <a th:href="@{/admin/users/details/{id}(id=${u.idTaiKhoan})}"
                                   class="btn btn-action btn-view shadow-sm"
                                   title="Xem chi tiết">
                                    <i class="bi bi-eye"></i>
                                </a>

                                <!-- Nút Sửa -->
                                <a th:href="@{/admin/users/edit/{id}(id=${u.idTaiKhoan})}"
                                   class="btn btn-action btn-edit mx-1 shadow-sm"
                                   title="Sửa thông tin">
                                    <i class="bi bi-pencil"></i>
                                </a>

                                <!-- Nút Xóa với confirm -->
                                <a th:href="@{/admin/users/delete/{id}(id=${u.idTaiKhoan})}"
                                   class="btn btn-action btn-delete shadow-sm"
                                   title="Xóa"
                                   th:onclick="return confirm('Bạn có chắc chắn muốn xóa tài khoản [[${u.tenDangNhap}]] không?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block th:fragment="extra_js">

</th:block>

</body>
</html>

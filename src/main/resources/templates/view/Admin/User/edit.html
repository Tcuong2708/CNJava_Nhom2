<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<body>

<div th:fragment="body_content">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card admin-form-card shadow border-0" style="border-radius: 15px;">
                    <div class="admin-header" style="background: #003366; color: white; padding: 20px; border-radius: 15px 15px 0 0;">
                        <h3 class="mb-1 fw-bold text-uppercase">
                            <i class="bi bi-person-gear me-2"></i>Cập Nhật Thông Tin
                        </h3>
                        <p class="mb-0 small text-white-50" th:text="${user.hoTen}">Họ tên người dùng</p>
                    </div>

                    <div class="card-body p-4">
                        <form th:action="@{/admin/users/edit}" th:object="${user}" method="post">
                            <input type="hidden" th:field="*{idTaiKhoan}" />

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Tên đăng nhập</label>
                                    <input type="text" th:field="*{tenDangNhap}" class="form-control bg-light" readonly />
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label text-danger">Vai trò (Quyền hạn)</label>
                                    <select th:field="*{roleID}" class="form-select border-danger">
                                        <option value="1">Quản Trị Viên</option>
                                        <option value="2">Nhân Viên</option>
                                        <option value="3">Khách Hàng</option>
                                    </select>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Họ và tên <span class="text-danger">*</span></label>
                                    <input type="text" th:field="*{hoTen}" class="form-control" required />
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Số điện thoại</label>
                                    <input type="text" th:field="*{soDienThoai}" class="form-control" />
                                </div>

                                <div class="col-md-12 mb-3">
                                    <label class="form-label">Quốc tịch</label>
                                    <input type="text" th:field="*{quocTich}" class="form-control" />
                                </div>

                                <div class="col-md-12 mb-3">
                                    <label class="form-label">Địa chỉ</label>
                                    <textarea th:field="*{diaChi}" class="form-control" rows="2"></textarea>
                                </div>
                            </div>

                            <div class="d-flex justify-content-between mt-4 pt-3 border-top">
                                <a th:href="@{/admin/users}" class="btn btn-outline-secondary px-4">Quay lại</a>
                                <button type="submit" class="btn btn-gold px-4 text-white" style="background: #C5A059;">
                                    CẬP NHẬT
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block th:fragment="extra_css">
    <style>
        /* Thêm CSS tùy chỉnh cho trang Edit nếu cần */
        .btn-gold:hover { background: #A68546 !important; }
    </style>
</th:block>

<th:block th:fragment="extra_js">
    <script>
        console.log("Trang chỉnh sửa đã nạp thành công!");
    </script>
</th:block>

</body>
</html>

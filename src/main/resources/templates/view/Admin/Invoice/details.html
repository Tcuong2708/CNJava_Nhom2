<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<th:block th:fragment="extra_css">
  <link class="stylesheet" th:href="@{/css/Admin/Invoice/details.css}" />
</th:block>

<div th:fragment="body_content">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-10">
        <div class="card order-card mb-4 shadow-sm">
          <div class="order-header d-flex justify-content-between align-items-center flex-wrap gap-2 text-white">
            <h4 class="mb-0 fw-bold text-uppercase">
              <i class="bi bi-receipt me-2 text-gold"></i>Đơn Hàng #<th:block th:text="${invoice.id}"></th:block>
            </h4>
            <span class="badge badge-date fs-6 px-3 py-2">
                            <i class="bi bi-calendar3 me-1"></i> <th:block th:text="${#temporals.format(invoice.ngayDat, 'dd/MM/yyyy HH:mm')}"></th:block>
                        </span>
          </div>
          <div class="card-body p-4">
            <div class="row g-3">
              <div class="col-md-6">
                <div class="info-group">
                  <label class="fw-bold text-navy"><i class="bi bi-person-fill me-2 text-muted"></i>Khách hàng:</label>
                  <span class="fw-bold text-dark" th:text="${invoice.hoTen}">Tên</span>
                </div>
              </div>
              <div class="col-md-6">
                <div class="info-group">
                  <label class="fw-bold text-navy"><i class="bi bi-telephone-fill me-2 text-muted"></i>Số điện thoại:</label>
                  <span th:text="${invoice.sdt}">SĐT</span>
                </div>
              </div>
              <div class="col-md-12 border-top pt-3 mt-2">
                <div class="info-group">
                  <label class="fw-bold text-navy"><i class="bi bi-geo-alt-fill me-2 text-muted"></i>Địa chỉ:</label>
                  <span th:text="${invoice.diaChi != null ? invoice.diaChi : 'Chưa cập nhật'}">Địa chỉ</span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <h5 class="mb-3 fw-bold text-uppercase ps-3 border-start border-5 border-warning text-navy">
          Danh sách phòng đã đặt
        </h5>

        <div class="card order-card shadow-sm">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
              <tr>
                <th class="ps-4 py-3">Tên phòng / Chi tiết</th>
                <th class="text-center">Số lượng</th>
                <th class="text-end">Đơn giá/Đêm</th>
                <th class="text-end pe-4">Thành tiền</th>
              </tr>
              </thead>
              <tbody>
              <tr>
                <td class="ps-4 fw-bold text-navy">
                  <span th:text="${invoice.phong != null ? invoice.phong.name : 'Mã phòng: #' + invoice.maPhong}">Phòng</span>
                  <div class="small text-muted fw-normal">
                    Thời gian: <th:block th:text="${#temporals.format(invoice.ngayCheckIn, 'dd/MM/yyyy')}"></th:block> đến <th:block th:text="${#temporals.format(invoice.ngayCheckOut, 'dd/MM/yyyy')}"></th:block>
                  </div>
                </td>
                <td class="text-center">1</td>
                <td class="text-end" th:text="${invoice.phong != null ? #numbers.formatDecimal(invoice.phong.price, 0, 'COMMA', 0, 'POINT') + ' đ' : '-'}">0 đ</td>
                <td class="text-end pe-4 fw-bold text-danger"
                    th:text="${#numbers.formatDecimal(invoice.totalPrice, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</td>
              </tr>
              <tr style="background-color: #f8f9fa;">
                <td colspan="3" class="text-end fw-bold py-3 fs-5 text-navy">TỔNG CỘNG:</td>
                <td class="text-end pe-4 fw-bold fs-4 py-3 text-gold"
                    th:text="${#numbers.formatDecimal(invoice.totalPrice, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</td>
              </tr>
              </tbody>
            </table>
          </div>
        </div>

        <div class="mt-4 text-center">
          <a th:href="@{/admin/invoices}" class="btn btn-outline-secondary px-4 py-2 fw-bold">
            <i class="bi bi-arrow-left me-2"></i> Quay lại danh sách
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

<div th:fragment="extra_js"></div>
</html>

<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nghiệp vụ Trả phòng (Check-out) - MAY HOTEL</title>
</head>
<body>

<th:block th:fragment="extra_css">
    <link rel="stylesheet" th:href="@{/css/Admin/Checkout/index.css}" />
</th:block>

<div th:fragment="body_content">
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold text-uppercase text-navy">
                <i class="bi bi-box-arrow-left me-2 text-gold"></i>Nghiệp vụ Trả phòng & Kết toán (Check-out)
            </h3>
        </div>

        <div th:if="${success}" class="alert alert-success border-0 shadow-sm text-center mb-4" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger border-0 shadow-sm text-center mb-4" th:text="${error}"></div>

        <div class="card shadow-sm border-0 rounded-3 overflow-hidden">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-navy text-white text-uppercase small">
                        <tr>
                            <th class="ps-4 py-3">Mã HD</th>
                            <th>Khách lưu trú</th>
                            <th class="text-center">Số phòng giải phóng</th>
                            <th>Thời gian ở</th>
                            <th class="text-center" style="width: 200px;">Nhập phí phụ thu (nếu có)</th>
                            <th class="text-center" style="width: 150px;">Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${invoices == null or #lists.isEmpty(invoices)}">
                            <td colspan="6" class="text-center py-5 text-muted">
                                <i class="bi bi-door-open fs-2 d-block mb-2 opacity-50"></i>
                                Hiện tại không có phòng nào đang trong trạng thái lưu trú cần làm thủ tục trả <phòng class=""></phòng>
                        </tr>
                        <tr th:unless="${invoices == null or #lists.isEmpty(invoices)}" th:each="item : ${invoices}">
                            <td class="ps-4 fw-bold text-navy" th:text="'#' + ${item.id}">#1</td>
                            <td class="fw-bold text-secondary" th:text="${item.hoTen}">Tên khách</td>
                            <td class="text-center">
                                    <span class="badge bg-danger px-3 py-2 rounded-pill fw-bold"
                                          th:text="'Phòng ' + ${item.maPhong}">Phòng 101</span>
                            </td>
                            <td>
                                <small class="d-block text-muted">Từ ngày: <span class="text-dark fw-bold" th:text="${item.ngayCheckIn}">01/01</span></small>
                                <small class="d-block text-muted">Đến ngày: <span class="text-dark fw-bold" th:text="${item.ngayCheckOut}">02/01</span></small>
                            </td>

                            <form th:action="@{/admin/checkout-room/execute}" method="post">
                                <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}" />
                                <input type="hidden" name="maHD" th:value="${item.id}" />

                                <td class="text-center">
                                    <div class="input-group input-group-sm mx-auto" style="max-width: 150px;">
                                        <input type="number" name="phuThu" class="form-control text-center text-danger fw-bold"
                                               value="0" min="0" step="10000" placeholder="0 đ" required />
                                        <span class="input-group-text bg-light text-muted small">đ</span>
                                    </div>
                                </td>
                                <td class="text-center">
                                    <button type="submit" class="btn btn-dark btn-sm px-3 rounded-pill fw-bold"
                                            onclick="return confirm('Xác nhận thu tiền phụ thu, kết toán hóa đơn và giải phóng phòng về trạng thái TRỐNG?')">
                                        <i class="bi bi-calculator me-1"></i> Trả phòng
                                    </button>
                                </td>
                            </form>

                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block th:fragment="extra_js">
</th:block>

</body>
</html>

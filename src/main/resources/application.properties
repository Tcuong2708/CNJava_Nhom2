spring.application.name=web-khachsan-nhom2


spring.datasource.url=jdbc:sqlserver://localhost;instanceName=SQLEXPRESS;databaseName=QuanLyKhachSan;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
